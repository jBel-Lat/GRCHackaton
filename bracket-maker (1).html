<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bracket HQ | Bracket Maker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a73e8;--blue-dk:#1558b0;--blue-lt:#e8f0fe;
  --green:#34a853;--green-dk:#2d9148;--green-lt:#e6f4ea;
  --red:#ea4335;--red-lt:#fce8e6;
  --gold:#f9ab00;
  --text:#202124;--muted:#5f6368;--border:#dadce0;--card:#fff;--bg:#f8f9fa;
}
html{scroll-behavior:smooth}
body{font-family:'Barlow',sans-serif;color:var(--text);background:var(--bg);min-height:100vh}

/* NAV */
header{background:#fff;border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;position:sticky;top:0;z-index:100}
nav{width:100%;max-width:1500px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:12px}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--blue);display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.logo svg{width:26px;height:26px;flex-shrink:0}
.sp{flex:1}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:9px 20px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;border:none;font-family:'Barlow',sans-serif}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--blue-dk)}
.btn-outline{border:1.5px solid var(--border);background:#fff;color:var(--text)}.btn-outline:hover{background:#f1f3f4}
.btn-sm{padding:7px 14px;font-size:13px}

/* PAGES */
.page{display:none}.page.active{display:block}

/* SETUP */
.sw{max-width:640px;margin:0 auto;padding:48px 24px}
.sw h1{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:800;margin-bottom:6px}
.sw .sub{color:var(--muted);font-size:16px;margin-bottom:36px}
.fg{margin-bottom:22px}
.fg label{display:block;font-size:14px;font-weight:700;margin-bottom:7px}
.fg input,.fg select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:'Barlow',sans-serif;color:var(--text);background:#fff;outline:none;transition:border-color .15s,box-shadow .15s}
.fg input:focus,.fg select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,115,232,.12)}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tc{border:1.5px solid var(--border);border-radius:10px;padding:14px 10px;cursor:pointer;transition:border-color .15s,background .15s;background:#fff;text-align:center;user-select:none}
.tc:hover{border-color:#aaa;background:#f8f9fa}
.tc.sel{border-color:var(--blue);background:var(--blue-lt)}
.tc-icon{font-size:26px;margin-bottom:6px}
.tc-name{font-size:13px;font-weight:700}
.tc-desc{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4}

.plist{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.prow{display:flex;align-items:center;gap:8px}
.pnum{font-size:12px;font-weight:700;color:var(--muted);min-width:20px;text-align:center;flex-shrink:0}
.prow input{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:14px;font-family:'Barlow',sans-serif;color:var(--text);outline:none;transition:border-color .15s}
.prow input:focus{border-color:var(--blue)}
.rm{width:30px;height:30px;border:none;background:none;cursor:pointer;color:#ccc;font-size:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:color .15s,background .15s;flex-shrink:0;line-height:1;padding:0}
.rm:hover{color:var(--red);background:var(--red-lt)}
.addp{background:none;border:none;font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;color:var(--blue);cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:4px}
.addp:hover{opacity:.7}
.hint{font-size:12px;color:var(--muted);margin-top:5px}

/* Tab bar */
.tab-bar{border-top:1px solid var(--border);background:#fff;padding:0 16px;overflow-x:auto;white-space:nowrap}
.tab-list{display:inline-flex;gap:0;align-items:flex-end;min-width:max-content}
.tab{display:inline-flex;align-items:center;gap:8px;padding:8px 16px 9px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;transition:color .15s,border-color .15s;user-select:none;white-space:nowrap;max-width:200px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-name{overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.tab-close{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;line-height:1;color:var(--muted);flex-shrink:0;transition:background .12s,color .12s}
.tab-close:hover{background:#f1f3f4;color:var(--red)}
.tab-add{display:inline-flex;align-items:center;padding:8px 12px 9px;font-size:18px;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;transition:color .15s}
.tab-add:hover{color:var(--blue)}


.bvw{padding:24px;max-width:1500px;margin:0 auto}
.bvh{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.bvt{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;flex:1;min-width:0}
.badge{display:inline-flex;align-items:center;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;white-space:nowrap;background:var(--blue-lt);color:var(--blue)}
.progw{height:5px;background:var(--border);border-radius:3px;margin-bottom:20px}
.progf{height:5px;background:var(--green);border-radius:3px;transition:width .4s}

/* BRACKET STRUCTURE */
.bscroll{overflow-x:auto;overflow-y:visible;padding-bottom:24px}
.rrow{display:flex;align-items:flex-start;gap:0;min-width:max-content}
.rcol{display:flex;flex-direction:column;min-width:208px}
.rlabel{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);text-align:center;padding-bottom:8px}

/* MATCH CARD */
.match-outer{display:flex;flex-direction:column;gap:3px}
.match-num{font-size:10px;font-weight:700;color:var(--muted);text-align:center;letter-spacing:.3px;display:flex;align-items:center;gap:5px;justify-content:center;height:16px}
.mnum-dot{width:6px;height:6px;border-radius:50%;background:var(--border);flex-shrink:0}
.match-num.is-next .mnum-dot{background:var(--blue);animation:pulse 1.4s ease-in-out infinite}
.match-num.is-next{color:var(--blue)}
.match-num.is-done{color:#1b7a30}
.match-num.is-done .mnum-dot{background:#1b7a30}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.match{background:var(--card);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;width:184px;flex-shrink:0;transition:box-shadow .15s,border-color .15s}
.match.clickable{cursor:pointer}.match.clickable:hover{box-shadow:0 2px 14px rgba(0,0,0,.12)}
.match.is-next-card{border-color:var(--blue);box-shadow:0 0 0 2px rgba(26,115,232,.15)}
.match.is-done-card{border-color:#a5d6a7}


/* Slots */
.slot{display:flex;align-items:center;gap:7px;padding:9px 10px;border-bottom:1px solid var(--border);min-height:42px}
.slot:last-child{border-bottom:none}
.slot.s-win{background:var(--green-lt)}.slot.s-win .sn{font-weight:700;color:#1b7a30}
.slot.s-lose{background:var(--red-lt)}.slot.s-lose .sn{color:#b31412}
.slot.s-bye{background:#f8f9fa}
.sseed{font-size:11px;font-weight:700;color:var(--muted);min-width:16px;text-align:center;flex-shrink:0}
.sn{font-size:13px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:108px}
.sn.tbd{color:var(--muted);font-size:12px;font-style:italic}


/* Connectors */
.mwrap{display:flex;align-items:center}
.conn{display:flex;flex-direction:column;width:22px;flex-shrink:0;align-self:stretch}
.cv{width:1px;background:var(--border);margin:0 auto}
.ch{height:1px;background:var(--border);width:100%}

/* Champion */
.champc{display:flex;align-items:center;padding:0 14px}
.champcard{background:#fff;border:2px solid var(--gold);border-radius:12px;padding:16px 20px;text-align:center;min-width:148px;box-shadow:0 4px 14px rgba(249,171,0,.18)}
.chico{font-size:28px;line-height:1}
.chlb{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);margin-top:7px}
.chnm{font-size:17px;font-weight:800;font-family:'Barlow Condensed',sans-serif;margin-top:3px}
.chtbd{font-size:13px;color:var(--muted);margin-top:3px}

.secdiv{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--blue);padding:14px 0 8px;border-top:2px dashed #c5d8fc;margin-top:8px}

/* ROUND ROBIN */
.rrtw{overflow-x:auto;margin-bottom:28px}
.rrt{border-collapse:collapse;font-size:14px;min-width:100%}
.rrt th,.rrt td{padding:10px 12px;border:1px solid var(--border);text-align:center;white-space:nowrap}
.rrt th{background:#f8f9fa;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
.rrt td.tnm{text-align:left;font-weight:600;min-width:140px}
.rrt td.self{background:#f1f3f4}
.rrt td.editable{cursor:pointer;transition:background .12s}.rrt td.editable:hover{background:var(--blue-lt)}
.rrt td.wc{background:var(--green-lt);color:#1b7a30;font-weight:700}
.rrt td.lc{background:var(--red-lt);color:#b31412;font-weight:700}
.stitle{font-size:15px;font-weight:700;margin:0 0 10px}
.sbtable{width:100%;border-collapse:collapse;font-size:14px}
.sbtable th,.sbtable td{padding:9px 12px;border:1px solid var(--border);text-align:center}
.sbtable th{background:#f8f9fa;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
.sbtable td.stnm{text-align:left;font-weight:600}
.sbtable tr:first-child td{background:#fffde7}
.sbtable tr:nth-child(2) td{background:#f8f9fa}
.medal{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:800;margin-right:4px}
.mg{background:var(--gold);color:#fff}.ms{background:#9aa0a6;color:#fff}.mb{background:#a0522d;color:#fff}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;width:390px;max-width:100%;box-shadow:0 12px 40px rgba(0,0,0,.22);overflow:hidden}
.mhead{padding:20px 24px 0}
.mhead h3{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;margin-bottom:2px}
.msub{font-size:12px;color:var(--muted)}
.mbody{padding:16px 24px}
.mfoot{padding:0 24px 20px;display:flex;gap:8px;justify-content:flex-end}

/* Modal internals */
.slabel{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:8px}
.mdivider{height:1px;background:var(--border);margin:16px 0 12px}

/* Score counter rows in modal */
.score-rows{display:flex;flex-direction:column;gap:8px;margin-bottom:4px}
.srow-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1.5px solid var(--border);background:#fff;transition:all .15s}
.srow-item.srow-win{border-color:var(--green);background:var(--green-lt)}
.srow-item.srow-lead{border-color:var(--blue);background:var(--blue-lt)}
.srow-seed{font-size:11px;font-weight:700;color:var(--muted);min-width:22px;text-align:center;flex-shrink:0}
.srow-name{font-size:14px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vs-label{text-align:center;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--muted)}
.wctr{display:flex;align-items:center;gap:6px;flex-shrink:0}
.wcb{width:30px;height:30px;border-radius:6px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;font-family:'Barlow',sans-serif;color:var(--text);flex-shrink:0}
.wcb:hover{background:#f1f3f4;border-color:#aaa}
.wcnum{font-size:24px;font-weight:800;min-width:32px;text-align:center;color:var(--text)}

/* Score shown on bracket card slot */
.slot-score{font-size:13px;font-weight:800;flex-shrink:0;min-width:18px;text-align:right;color:var(--muted)}
.slot.s-win .slot-score{color:#1b7a30}
.slot.s-lose .slot-score{color:var(--red)}


/* Set-winner buttons */
.wbtns{display:flex;gap:8px}
.wbtn{flex:1;padding:10px 8px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:13px;font-weight:700;font-family:'Barlow',sans-serif;transition:all .15s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.wbtn:hover{border-color:var(--green);background:var(--green-lt);color:#1b7a30}
.wbtn.chosen{border-color:var(--green);background:var(--green-lt);color:#1b7a30}

@media(max-width:600px){
  .tgrid{grid-template-columns:1fr 1fr}
  .rcol{min-width:172px}.match{width:162px}.sn{max-width:88px}
  .sw{padding:28px 16px}.modal{width:100%}
}
</style>
</head>
<body>

<header>
  <nav>
    <div class="logo" onclick="goSetup()">
      <svg viewBox="0 0 26 26" fill="none">
        <rect x="1" y="3" width="8" height="6" rx="2" fill="#1a73e8"/>
        <rect x="1" y="17" width="8" height="6" rx="2" fill="#1a73e8"/>
        <rect x="17" y="10" width="8" height="6" rx="2" fill="#34a853"/>
        <line x1="9" y1="6" x2="17" y2="13" stroke="#1a73e8" stroke-width="1.8"/>
        <line x1="9" y1="20" x2="17" y2="13" stroke="#1a73e8" stroke-width="1.8"/>
      </svg>
      Bracket HQ
    </div>
    <span class="sp"></span>
    <button class="btn btn-primary btn-sm" onclick="goSetup()">+ New Bracket</button>
  </nav>
  <!-- Tab bar (shown only on bracket page) -->
  <div class="tab-bar" id="tab-bar" style="display:none">
    <div class="tab-list" id="tab-list"></div>
  </div>
</header>

<!-- SETUP -->
<div id="page-setup" class="page active">
<div class="sw">
  <h1>Create a Bracket</h1>
  <p class="sub">Choose a format, add participants, and generate.</p>

  <div class="fg">
    <label>Tournament Name</label>
    <input type="text" id="tname" placeholder="e.g. Summer Championship 2025"/>
  </div>

  <div class="fg">
    <label>Tournament Format</label>
    <div class="tgrid">
      <div class="tc sel" data-type="single" onclick="selType('single')">
        <div class="tc-icon">🏆</div>
        <div class="tc-name">Single Elimination</div>
        <div class="tc-desc">One loss and you're out</div>
      </div>
      <div class="tc" data-type="double" onclick="selType('double')">
        <div class="tc-icon">🔁</div>
        <div class="tc-name">Double Elimination</div>
        <div class="tc-desc">Two losses to be eliminated</div>
      </div>
      <div class="tc" data-type="rr" onclick="selType('rr')">
        <div class="tc-icon">⚽</div>
        <div class="tc-name">Round Robin</div>
        <div class="tc-desc">Everyone plays everyone</div>
      </div>
    </div>
  </div>


  <div class="fg" id="sizefg">
    <label>Bracket Size</label>
    <select id="tsize">
      <option value="auto">Auto (fit participants)</option>
      <option value="4">4 slots</option>
      <option value="8">8 slots</option>
      <option value="16">16 slots</option>
      <option value="32">32 slots</option>
    </select>
  </div>

  <div class="fg">
    <label>Participants <span id="p-count" style="font-weight:400;color:var(--muted)"></span></label>
    <div class="plist" id="plist"></div>
    <button class="addp" onclick="addP()">+ Add Participant</button>
    <p class="hint">Seeded in order listed — #1 is the top seed.</p>
  </div>

  <button class="btn btn-primary" style="width:100%;padding:13px;font-size:16px;border-radius:8px;margin-top:4px" onclick="generate()">
    Generate Bracket →
  </button>
</div>
</div>

<!-- BRACKET -->
<div id="page-bracket" class="page">
  <div class="bvw">
    <div class="bvh">
      <div class="bvt" id="bvtitle">Tournament</div>
      <span class="badge" id="bvbadge">Single Elimination</span>
      <button class="btn btn-outline btn-sm" onclick="editCurrentBracket()">✏️ Edit</button>
    </div>
    <div class="progw"><div class="progf" id="progf" style="width:0%"></div></div>
    <div id="bcontent"></div>
  </div>
</div>

<!-- MODAL -->
<div class="ov" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="mhead">
      <h3 id="m-title">Match</h3>
      <p class="msub" id="m-sub"></p>
    </div>
    <div class="mbody" id="m-body"></div>
    <div class="mfoot">
      <button class="btn btn-outline btn-sm" onclick="closeModal()">Close</button>
      <button class="btn btn-primary btn-sm" id="confirm-btn" onclick="confirmResult()" style="display:none">Confirm &amp; Advance →</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   STATE  — multi-bracket support
============================================================ */
let ttype    = 'single';
let brackets = [];      // array of saved bracket state objects
let activeIdx= -1;      // which bracket is currently shown
let G        = {};      // current bracket (mirrors brackets[activeIdx])
let AM       = null;    // active modal

// Editing context: null = creating new, number = editing existing bracket at that index
let editingIdx = null;

const DEFAULTS = ['Team Alpha','Team Beta','Team Gamma','Team Delta',
                  'Team Epsilon','Team Zeta','Team Theta','Team Sigma'];

/* ============================================================
   SETUP
============================================================ */
function init(){
  document.getElementById('plist').innerHTML = '';
  document.getElementById('tname').value = '';
  DEFAULTS.forEach(n => addPVal(n));
  updPCount();
  selType('single');
}

// Pre-fill setup form from an existing bracket for editing
function loadSetupFromBracket(b){
  document.getElementById('tname').value = b.name || '';
  selType(b.type==='rr'?'rr':b.type==='double'?'double':'single');
  document.getElementById('plist').innerHTML = '';
  const teams = b.type==='rr' ? b.teams : extractTeams(b);
  teams.forEach(t => addPVal(t));
  updPCount();
  if(b.type!=='rr'){
    const sv = document.getElementById('tsize');
    sv.value = String(b.size) in {'4':'4','8':'8','16':'16','32':'32'} ? String(b.size) : 'auto';
  }
}

// Extract original team names from a single/double bracket
function extractTeams(b){
  const src = b.type==='single' ? b.rounds[0] : b.wb[0];
  const out = [];
  src.forEach(m=>{
    if(m.a && m.a!=='BYE') out.push({n:m.a,s:m.sa||99});
    if(m.b && m.b!=='BYE') out.push({n:m.b,s:m.sb||99});
  });
  out.sort((a,b)=>a.s-b.s);
  return out.map(x=>x.n);
}

function selType(t){
  ttype = t;
  document.querySelectorAll('.tc').forEach(c => c.classList.toggle('sel', c.dataset.type===t));
  document.getElementById('sizefg').style.display = t === 'rr' ? 'none' : '';
}

function addP(){ addPVal(''); }
function addPVal(v){
  const list = document.getElementById('plist');
  const idx  = list.children.length;
  const d    = document.createElement('div');
  d.className = 'prow';
  d.innerHTML =
    `<span class="pnum">${idx+1}</span>` +
    `<input type="text" placeholder="Participant ${idx+1}" value="${esc(v)}" oninput="updPCount()"/>` +
    `<button class="rm" onclick="this.closest('.prow').remove();renum()">×</button>`;
  list.appendChild(d);
  if(!v) setTimeout(()=>d.querySelector('input').focus(),30);
  updPCount();
}
function renum(){
  document.querySelectorAll('.prow').forEach((r,i)=>r.querySelector('.pnum').textContent=i+1);
  updPCount();
}
function updPCount(){
  const n = document.querySelectorAll('.prow input').length;
  document.getElementById('p-count').textContent = `(${n})`;
}
function getTeams(){
  return [...document.querySelectorAll('.prow input')].map(i=>i.value.trim()).filter(Boolean);
}

/* Go to setup to create a brand-new bracket */
function goSetup(){
  editingIdx = null;
  init();
  showPage('setup');
}

/* Edit the currently viewed bracket */
function editCurrentBracket(){
  editingIdx = activeIdx;
  loadSetupFromBracket(brackets[activeIdx]);
  showPage('setup');
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.getElementById('tab-bar').style.display = id==='bracket' ? '' : 'none';
  window.scrollTo(0,0);
}

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ============================================================
   TAB BAR
============================================================ */
function renderTabs(){
  const list = document.getElementById('tab-list');
  list.innerHTML = '';
  brackets.forEach((b,i)=>{
    const pct  = getBracketProgress(b);
    const done = pct===100 ? ' 🏆' : '';
    const tab  = document.createElement('div');
    tab.className = 'tab' + (i===activeIdx?' active':'');
    tab.innerHTML =
      `<span class="tab-name">${esc(b.name)}${done}</span>` +
      `<span class="tab-close" onclick="closeTab(${i},event)" title="Remove">×</span>`;
    tab.addEventListener('click', ()=>switchTab(i));
    list.appendChild(tab);
  });
  // "+" button
  const add = document.createElement('div');
  add.className = 'tab-add';
  add.title = 'New bracket';
  add.textContent = '+';
  add.onclick = goSetup;
  list.appendChild(add);
}

function switchTab(i){
  if(i===activeIdx) return;
  activeIdx = i;
  G = brackets[i];
  renderBracketView();
  renderTabs();
}

function closeTab(i, e){
  e.stopPropagation();
  if(brackets.length===1){
    // last bracket — go back to setup
    brackets = [];
    activeIdx = -1;
    G = {};
    renderTabs();
    goSetup();
    return;
  }
  brackets.splice(i,1);
  if(activeIdx >= brackets.length) activeIdx = brackets.length-1;
  else if(activeIdx > i) activeIdx--;
  G = brackets[activeIdx];
  renderBracketView();
  renderTabs();
}

function getBracketProgress(b){
  let tot=0,dn=0;
  function cnt(rnds){ rnds.forEach(rnd=>rnd.forEach(m=>{ if(m.a&&m.b&&m.a!=='BYE'&&m.b!=='BYE'){tot++;if(m.done)dn++;} })); }
  if(b.type==='single')      cnt(b.rounds);
  else if(b.type==='double') { cnt(b.wb); cnt(b.lb); cnt([b.gf]); }
  else if(b.type==='rr'){
    tot=b.n*(b.n-1)/2;
    for(let i=0;i<b.n;i++) for(let j=i+1;j<b.n;j++) if(b.results[i][j].played)dn++;
  }
  return tot>0 ? Math.round(dn/tot*100) : 0;
}

/* Render the active bracket into the bracket page */
function renderBracketView(){
  const b = brackets[activeIdx];
  document.getElementById('bvtitle').textContent = b.name;
  document.getElementById('bvbadge').textContent =
    {single:'Single Elimination',double:'Double Elimination',rr:'Round Robin'}[b.type];
  if(b.type==='single')      renderSingle();
  else if(b.type==='double') renderDouble();
  else                       renderRR();
  updProg();
}



/* ============================================================
   SEEDING  — seedOrder(8) → [0,7,3,4,1,6,2,5]
   Pairs: seed1 vs seed8, seed4 vs seed5, seed2 vs seed7, seed3 vs seed6
============================================================ */
function seedOrder(n){
  if(n===1) return [0];
  if(n===2) return [0,1];
  const prev = seedOrder(n/2);
  const out  = [];
  prev.forEach(i=>{ out.push(i); out.push(n-1-i); });
  return out;
}

/* ============================================================
   GENERATE
============================================================ */
function nextPow2(n){ let p=1; while(p<n) p*=2; return p; }

function generate(){
  const name  = document.getElementById('tname').value.trim() || 'My Tournament';
  const teams = getTeams();
  if(teams.length<2){ alert('Add at least 2 participants.'); return; }

  // Build new bracket state into G
  if     (ttype==='rr')     genRR(name,teams);
  else if(ttype==='double') genDouble(name,teams);
  else                      genSingle(name,teams);

  if(editingIdx !== null && editingIdx >= 0 && editingIdx < brackets.length){
    // Replace existing bracket
    brackets[editingIdx] = G;
    activeIdx = editingIdx;
  } else {
    // Add as a new bracket tab
    brackets.push(G);
    activeIdx = brackets.length - 1;
  }
  editingIdx = null;

  document.getElementById('bvtitle').textContent = G.name;
  document.getElementById('bvbadge').textContent =
    {single:'Single Elimination',double:'Double Elimination',rr:'Round Robin'}[G.type];

  renderTabs();
  showPage('bracket');

  if(G.type==='single')      renderSingle();
  else if(G.type==='double') renderDouble();
  else                       renderRR();
  updProg();
}

/* ---- match factory ---- */
function mkM(a,sa,b,sb){
  return {a:a||null, sa:sa||null, b:b||null, sb:sb||null,
          wa:0, wb:0, w:null, done:false};
}

/* ============================================================
   SINGLE ELIMINATION
============================================================ */
function genSingle(name,teams){
  const sv   = document.getElementById('tsize').value;
  const size = sv==='auto' ? nextPow2(teams.length) : parseInt(sv);
  const nr   = Math.log2(size);
  const p    = teams.slice();
  while(p.length<size) p.push('BYE');

  const order = seedOrder(size);
  const r1    = [];
  for(let i=0;i<order.length;i+=2){
    const ai=order[i], bi=order[i+1];
    r1.push(mkM(p[ai], ai<teams.length?ai+1:null,
                p[bi], bi<teams.length?bi+1:null));
  }
  const rounds = [r1];
  for(let r=1;r<nr;r++){
    const rnd=[];
    for(let m=0;m<rounds[r-1].length/2;m++) rnd.push(mkM(null,null,null,null));
    rounds.push(rnd);
  }
  // auto-advance BYEs
  r1.forEach((m,mi)=>{
    if(m.b==='BYE'&&m.a&&m.a!=='BYE'){ m.w=m.a; m.done=true; fwdSE(rounds,0,mi,m.a,m.sa); }
    else if(m.a==='BYE'&&m.b&&m.b!=='BYE'){ m.w=m.b; m.done=true; fwdSE(rounds,0,mi,m.b,m.sb); }
  });

  G={type:'single',name,rounds,size};
  renderSingle(); updProg();
}

function fwdSE(rounds,r,mi,winner,seed){
  if(r+1>=rounds.length) return;
  const nxt=rounds[r+1][Math.floor(mi/2)];
  if(mi%2===0){nxt.a=winner;nxt.sa=seed;}
  else         {nxt.b=winner;nxt.sb=seed;}
  // cascade BYE
  if(nxt.b==='BYE'&&nxt.a&&nxt.a!=='BYE'){nxt.w=nxt.a;nxt.done=true;fwdSE(rounds,r+1,Math.floor(mi/2),nxt.a,nxt.sa);}
  else if(nxt.a==='BYE'&&nxt.b&&nxt.b!=='BYE'){nxt.w=nxt.b;nxt.done=true;fwdSE(rounds,r+1,Math.floor(mi/2),nxt.b,nxt.sb);}
}

/* ============================================================
   DOUBLE ELIMINATION
============================================================ */
function genDouble(name,teams){
  const sv   = document.getElementById('tsize').value;
  const size = sv==='auto' ? nextPow2(teams.length) : parseInt(sv);
  const p    = teams.slice();
  while(p.length<size) p.push('BYE');

  const wbRounds = Math.log2(size);
  const order    = seedOrder(size);

  const wb=[]; const wbR1=[];
  for(let i=0;i<order.length;i+=2){
    const ai=order[i],bi=order[i+1];
    wbR1.push(mkM(p[ai],ai<teams.length?ai+1:null,p[bi],bi<teams.length?bi+1:null));
  }
  wb.push(wbR1);
  for(let r=1;r<wbRounds;r++){
    const rnd=[];
    for(let m=0;m<wb[r-1].length/2;m++) rnd.push(mkM(null,null,null,null));
    wb.push(rnd);
  }
  wbR1.forEach((m,mi)=>{
    if(m.b==='BYE'&&m.a&&m.a!=='BYE'){m.w=m.a;m.done=true;}
    else if(m.a==='BYE'&&m.b&&m.b!=='BYE'){m.w=m.b;m.done=true;}
  });

  // LB: 2*(wbRounds-1) rounds
  const lb=[];
  for(let r=0;r<2*(wbRounds-1);r++){
    const cnt=Math.max(1,size/Math.pow(2,Math.floor(r/2)+2));
    const rnd=[];
    for(let m=0;m<cnt;m++) rnd.push(mkM(null,null,null,null));
    lb.push(rnd);
  }

  const gf=[mkM(null,null,null,null)];
  G={type:'double',name,wb,lb,gf,size};
  renderDouble(); updProg();
}

/* ============================================================
   ROUND ROBIN
============================================================ */
function genRR(name,teams){
  const n=teams.length;
  const results=Array.from({length:n},()=>
    Array.from({length:n},()=>({played:false,si:0,sj:0,wi:false}))
  );
  G={type:'rr',name,teams,results,n};
  renderRR(); updProg();
}

/* ============================================================
   RENDER HELPERS
============================================================ */
function roundLabel(r,total){
  const fe=total-1-r;
  if(fe===0) return 'Final';
  if(fe===1) return 'Semifinals';
  if(fe===2) return 'Quarterfinals';
  return `Round of ${Math.pow(2,fe+1)}`;
}

/* Returns the key of the first incomplete playable match */
function nextMatchKey(){
  function check(list,prefix){
    for(let r=0;r<list.length;r++)
      for(let m=0;m<list[r].length;m++){
        const x=list[r][m];
        if(x.a&&x.b&&x.a!=='BYE'&&x.b!=='BYE'&&!x.done) return `${prefix}-${r}-${m}`;
      }
    return null;
  }
  if(G.type==='single') return check(G.rounds,'s');
  if(G.type==='double'){
    return check(G.wb,'wb') || check(G.lb,'lb') ||
      (G.gf[0].a&&G.gf[0].b&&!G.gf[0].done ? 'gf-0-0' : null);
  }
  return null;
}

/* Build a match card HTML string.
   num  = display number (integer) or null (don't show label for TBD slots) */
function matchCard(m, ctx, r, mi, num){
  const hasBothTeams = !!(m.a && m.b && m.a!=='BYE' && m.b!=='BYE');
  // ALL real matches are clickable — done ones too (for editing)
  const canClick = hasBothTeams;
  const nk  = nextMatchKey();
  const myK = `${ctx}-${r}-${mi}`;
  const isNext = !m.done && myK===nk;

  // ---- number label ----
  let numHtml = '<div style="height:16px"></div>';
  if(num !== null && hasBothTeams){
    const cls = m.done ? 'match-num is-done' : isNext ? 'match-num is-next' : 'match-num';
    const label = m.done ? `Match ${num} ✓` : `Match ${num}`;
    numHtml = `<div class="${cls}"><div class="mnum-dot"></div>${label}</div>`;
  }

  // ---- slots ----
  const aWin  = m.done && m.w===m.a;
  const bWin  = m.done && m.w===m.b;
  const aLose = m.done && !aWin && m.a && m.a!=='BYE';
  const bLose = m.done && !bWin && m.b && m.b!=='BYE';

  function slotHTML(name,seed,wins,isWin,isLose){
    const tbd = !name, bye = name==='BYE';
    let sc = 'slot';
    if(isWin)  sc+=' s-win';
    if(isLose) sc+=' s-lose';
    if(bye)    sc+=' s-bye';
    const nm = tbd ? `<span class="sn tbd">TBD</span>`
             : bye ? `<span class="sn tbd">BYE</span>`
             : `<span class="sn">${esc(name)}</span>`;
    const sd  = seed ? `<span class="sseed">${seed}</span>` : `<span class="sseed"></span>`;
    const chk = isWin ? `<span style="font-size:11px;color:#1b7a30;flex-shrink:0">✓</span>` : '';
    const showScore = !!(name && !bye && (isWin || isLose || wins > 0));
    const sc2 = showScore ? `<span class="slot-score">${wins}</span>` : '';
    return `<div class="${sc}">${sd}${nm}${chk}${sc2}</div>`;
  }

  const mc = ['match', canClick?'clickable':'', isNext?'is-next-card':'', m.done?'is-done-card':'']
    .filter(Boolean).join(' ');
  const title = m.done ? 'title="Click to edit result"' : '';
  const oc = canClick ? `onclick="openModal('${ctx}',${r},${mi})"` : '';

  return `<div class="match-outer">
    ${numHtml}
    <div class="${mc}" ${oc} ${title}>
      ${slotHTML(m.a,m.sa,m.wa,aWin,aLose)}
      ${slotHTML(m.b,m.sb,m.wb,bWin,bLose)}
    </div>
  </div>`;
}

/* ============================================================
   RENDER — SINGLE
============================================================ */
function renderSingle(){
  const {rounds}=G;
  const nr=rounds.length, base=rounds[0].length;
  const MH = 98;

  // Assign match numbers ONLY to slots that have two real teams
  let counter=0;
  const nums=rounds.map(rnd=>rnd.map(m=>{
    if(m.a&&m.b&&m.a!=='BYE'&&m.b!=='BYE') return ++counter;
    return null;
  }));

  let h='<div class="bscroll"><div class="rrow">';
  rounds.forEach((rnd,r)=>{
    const nm=rnd.length, cell=(base/nm)*MH;
    h+=`<div class="rcol"><div class="rlabel">${roundLabel(r,nr)}</div><div class="mcol">`;
    rnd.forEach((m,mi)=>{
      const topPad=mi===0?Math.max(0,cell/2-MH/2):Math.max(0,cell-MH);
      h+=`<div class="mwrap" style="padding-top:${topPad}px">`;
      h+=matchCard(m,'s',r,mi,nums[r][mi]);
      if(r<nr-1){
        const half=cell/2, top=(mi%2===0);
        h+=`<div class="conn" style="height:${MH}px">`;
        if(top) h+=`<div style="flex:1"></div><div class="ch"></div><div class="cv" style="height:${half}px"></div>`;
        else    h+=`<div class="cv" style="height:${half}px"></div><div class="ch"></div><div style="flex:1"></div>`;
        h+=`</div>`;
      }
      h+=`</div>`;
    });
    h+=`</div></div>`;
  });
  h+=champCard(rounds[nr-1][0]?.w)+'</div></div>';
  document.getElementById('bcontent').innerHTML=h;
}

/* ============================================================
   RENDER — DOUBLE
============================================================ */
function renderDouble(){
  const {wb,lb,gf}=G;
  const nwb=wb.length, base=wb[0].length;
  const MH=98;

  let counter=0;
  const wbN=wb.map(rnd=>rnd.map(m=>(m.a&&m.b&&m.a!=='BYE'&&m.b!=='BYE')?++counter:null));
  const lbN=lb.map(rnd=>rnd.map(m=>(m.a&&m.b&&m.a!=='BYE'&&m.b!=='BYE')?++counter:null));
  const gfN=(gf[0].a&&gf[0].b&&gf[0].a!=='BYE'&&gf[0].b!=='BYE')?++counter:null;

  let h='<div class="bscroll">';

  // WB
  h+='<div class="secdiv">Winners Bracket</div><div class="rrow">';
  wb.forEach((rnd,r)=>{
    const nm=rnd.length, cell=(base/nm)*MH;
    h+=`<div class="rcol"><div class="rlabel">WB – ${roundLabel(r,nwb)}</div><div class="mcol">`;
    rnd.forEach((m,mi)=>{
      const topPad=mi===0?Math.max(0,cell/2-MH/2):Math.max(0,cell-MH);
      h+=`<div class="mwrap" style="padding-top:${topPad}px">`;
      h+=matchCard(m,'wb',r,mi,wbN[r][mi]);
      if(r<nwb-1){
        const half=cell/2, top=(mi%2===0);
        h+=`<div class="conn" style="height:${MH}px">`;
        if(top) h+=`<div style="flex:1"></div><div class="ch"></div><div class="cv" style="height:${half}px"></div>`;
        else    h+=`<div class="cv" style="height:${half}px"></div><div class="ch"></div><div style="flex:1"></div>`;
        h+=`</div>`;
      }
      h+=`</div>`;
    });
    h+=`</div></div>`;
  });
  h+='</div>';

  // LB
  if(lb.length>0){
    const lbBase=lb[0].length;
    h+='<div class="secdiv" style="margin-top:20px">Losers Bracket</div><div class="rrow">';
    lb.forEach((rnd,r)=>{
      const nm=rnd.length, cell=lbBase>0?(lbBase/Math.max(nm,1))*MH:MH;
      h+=`<div class="rcol"><div class="rlabel">LB Round ${r+1}</div><div class="mcol">`;
      rnd.forEach((m,mi)=>{
        const topPad=mi===0?Math.max(0,cell/2-MH/2):Math.max(0,cell-MH);
        h+=`<div class="mwrap" style="padding-top:${topPad}px">`;
        h+=matchCard(m,'lb',r,mi,lbN[r][mi]);
        h+=`</div>`;
      });
      h+=`</div></div>`;
    });
    h+='</div>';
  }

  // GF
  h+='<div class="secdiv" style="margin-top:20px">Grand Final</div><div class="rrow">';
  h+=`<div class="rcol"><div class="rlabel">Grand Final</div><div class="mcol"><div class="mwrap">`;
  h+=matchCard(gf[0],'gf',0,0,gfN);
  h+=`</div></div></div>`;
  h+=champCard(gf[0]?.w)+'</div></div>';
  document.getElementById('bcontent').innerHTML=h;
}

function champCard(name){
  return `<div class="champc"><div class="champcard">
    <div class="chico">🏆</div><div class="chlb">Champion</div>
    ${name?`<div class="chnm">${esc(name)}</div>`:`<div class="chtbd">TBD</div>`}
  </div></div>`;
}

/* ============================================================
   RENDER — ROUND ROBIN
============================================================ */
function renderRR(){
  const {teams,results,n}=G;
  const wins=Array(n).fill(0), losses=Array(n).fill(0);
  for(let i=0;i<n;i++) for(let j=0;j<n;j++)
    if(i!==j&&results[i][j].played){ if(results[i][j].wi) wins[i]++; else losses[i]++; }

  let h='<div class="rrtw"><table class="rrt"><thead><tr><th></th>';
  teams.forEach(t=>{ h+=`<th>${esc(t)}</th>`; });
  h+='<th>W</th><th>L</th><th>Pts</th></tr></thead><tbody>';
  teams.forEach((t,i)=>{
    h+=`<tr><td class="tnm">${esc(t)}</td>`;
    teams.forEach((_,j)=>{
      if(i===j){h+=`<td class="self">—</td>`;return;}
      const r=results[i][j];
      h+=r.played?`<td class="${r.wi?'wc':'lc'}">${r.si}–${r.sj}</td>`
                 :`<td class="editable" onclick="openRRModal(${i},${j})">vs</td>`;
    });
    h+=`<td><b>${wins[i]}</b></td><td>${losses[i]}</td><td><b>${wins[i]*3}</b></td></tr>`;
  });
  h+='</tbody></table></div>';

  const ranked=teams.map((_,i)=>i).sort((a,b)=>(wins[b]-wins[a])||(losses[a]-losses[b]));
  h+='<div class="stitle">Standings</div><table class="sbtable"><thead><tr><th>#</th><th style="text-align:left">Team</th><th>W</th><th>L</th><th>Pts</th></tr></thead><tbody>';
  ranked.forEach((ti,rk)=>{
    const m=rk===0?`<span class="medal mg">1</span>`:rk===1?`<span class="medal ms">2</span>`:rk===2?`<span class="medal mb">3</span>`:`${rk+1}`;
    h+=`<tr><td>${m}</td><td class="stnm">${esc(teams[ti])}</td><td><b>${wins[ti]}</b></td><td>${losses[ti]}</td><td><b>${wins[ti]*3}</b></td></tr>`;
  });
  h+='</tbody></table>';
  document.getElementById('bcontent').innerHTML=h;
}

/* ============================================================
   MODAL
============================================================ */
function getMatch(ctx,r,mi){
  if(ctx==='s')  return G.rounds[r][mi];
  if(ctx==='wb') return G.wb[r][mi];
  if(ctx==='lb') return G.lb[r][mi];
  if(ctx==='gf') return G.gf[mi];
  return null;
}

/* ============================================================
   CASCADE RESET  — recursively wipes a confirmed match and all
   downstream results that depended on it. Keeps game-win tallies
   so the user sees the previous scores when re-editing.
============================================================ */
function cascadeReset(ctx,r,mi){
  const m=getMatch(ctx,r,mi);
  if(!m) return;
  const oldW=m.w;
  const oldLoser=oldW?(oldW===m.a?m.b:m.a):null;
  m.done=false; m.w=null;

  function clearSlot(nxt,isA){
    if(!nxt) return;
    if(isA){if(nxt.a===oldW){nxt.a=null;nxt.sa=null;}}
    else    {if(nxt.b===oldW){nxt.b=null;nxt.sb=null;}}
    nxt.w=null; nxt.done=false;
  }

  if(ctx==='s'){
    if(r+1<G.rounds.length){
      const nm=Math.floor(mi/2);
      const nxt=G.rounds[r+1][nm];
      clearSlot(nxt, mi%2===0);
      if(oldW) cascadeReset('s',r+1,nm);
    }
  } else if(ctx==='wb'){
    if(r+1<G.wb.length){
      const nm=Math.floor(mi/2);
      const nxt=G.wb[r+1][nm];
      clearSlot(nxt, mi%2===0);
      if(oldW) cascadeReset('wb',r+1,nm);
    } else {
      if(G.gf[0].a===oldW){G.gf[0].a=null;G.gf[0].sa=null;G.gf[0].w=null;G.gf[0].done=false;}
    }
    // Remove loser from LB
    if(oldLoser&&G.lb.length>0){
      const lbIdx=Math.min(r*2,G.lb.length-1);
      G.lb[lbIdx].forEach((lm,li)=>{
        if(lm.a===oldLoser){lm.a=null;lm.sa=null;lm.w=null;lm.done=false;cascadeReset('lb',lbIdx,li);}
        else if(lm.b===oldLoser){lm.b=null;lm.sb=null;lm.w=null;lm.done=false;cascadeReset('lb',lbIdx,li);}
      });
    }
  } else if(ctx==='lb'){
    if(r+1<G.lb.length){
      const nm=Math.floor(mi/2);
      const nxt=G.lb[r+1][nm];
      clearSlot(nxt, mi%2===0);
      if(oldW) cascadeReset('lb',r+1,nm);
    } else {
      if(G.gf[0].b===oldW){G.gf[0].b=null;G.gf[0].sb=null;G.gf[0].w=null;G.gf[0].done=false;}
    }
  }
  // gf: nothing downstream
}

/* Open a match for editing. If it was already confirmed, cascade-undo first. */
function openModal(ctx,r,mi){
  const m=getMatch(ctx,r,mi);
  if(!m||!m.a||!m.b||m.a==='BYE'||m.b==='BYE') return;
  if(m.done){ cascadeReset(ctx,r,mi); updProg(); }
  AM={ctx,r,mi};
  buildModal(m);
  document.getElementById('modal').style.display='flex';
}

function openRRModal(i,j){
  AM={ctx:'rr',i,j};
  const r=G.results[i][j];
  document.getElementById('m-title').textContent='Match Result';
  document.getElementById('m-sub').textContent=`${esc(G.teams[i])} vs ${esc(G.teams[j])}`;
  document.getElementById('confirm-btn').style.display='';
  document.getElementById('m-body').innerHTML=`
    <div class="slabel">Score</div>
    <div class="trow" id="rr-a">
      <span class="tbadge">#${i+1}</span>
      <span class="tname">${esc(G.teams[i])}</span>
      <div class="wctr">
        <button class="wcb minus" onclick="rrAdj(0,-1)">−</button>
        <span class="wcnum" id="rr-sa">${r.played?r.si:0}</span>
        <button class="wcb plus"  onclick="rrAdj(0,1)">+</button>
      </div>
    </div>
    <div style="text-align:center;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--muted);margin:4px 0">VS</div>
    <div class="trow" id="rr-b">
      <span class="tbadge">#${j+1}</span>
      <span class="tname">${esc(G.teams[j])}</span>
      <div class="wctr">
        <button class="wcb minus" onclick="rrAdj(1,-1)">−</button>
        <span class="wcnum" id="rr-sb">${r.played?r.sj:0}</span>
        <button class="wcb plus"  onclick="rrAdj(1,1)">+</button>
      </div>
    </div>`;
  document.getElementById('modal').style.display='flex';
}

function rrAdj(who,d){
  const sa=document.getElementById('rr-sa');
  const sb=document.getElementById('rr-sb');
  if(who===0) sa.textContent=Math.max(0,(parseInt(sa.textContent)||0)+d);
  else        sb.textContent=Math.max(0,(parseInt(sb.textContent)||0)+d);
  const a=parseInt(sa.textContent)||0, b=parseInt(sb.textContent)||0;
  document.getElementById('rr-a').classList.toggle('t-lead',a>b);
  document.getElementById('rr-b').classList.toggle('t-lead',b>a);
}

function buildModal(m){
  const {ctx,r,mi}=AM;
  const labels={s:'Single Elim',wb:'Winners Bracket',lb:'Losers Bracket',gf:'Grand Final'};
  const isEdit=m.done;

  document.getElementById('m-title').textContent = isEdit ? 'Edit Result' : 'Match';
  document.getElementById('m-sub').textContent=`${labels[ctx]} · ${esc(m.a)} vs ${esc(m.b)}`;

  const editBanner = isEdit ? `<div style="background:#fff8e1;border:1.5px solid #f9ab00;border-radius:8px;padding:9px 12px;margin-bottom:14px;font-size:12px;font-weight:600;color:#7a5100;display:flex;align-items:center;gap:8px;">
    <span>✏️</span><span style="flex:1">This match is confirmed. Change the winner or click Undo to revert.</span>
    <button class="wcb" style="font-size:11px;padding:4px 8px;width:auto;height:auto;white-space:nowrap" onclick="resetMatch()">Undo</button>
  </div>` : '';

  document.getElementById('m-body').innerHTML=`
    ${editBanner}
    <div class="score-rows">
      <div class="srow-item${m.w===m.a?' srow-win':''}">
        <span class="srow-seed">${m.sa?'#'+m.sa:''}</span>
        <span class="srow-name">${esc(m.a)}</span>
        <div class="wctr">
          <button class="wcb" onclick="adjScore('a',-1)">−</button>
          <span class="wcnum" id="wc-a">${m.wa}</span>
          <button class="wcb" onclick="adjScore('a',1)">+</button>
        </div>
      </div>
      <div class="vs-label">VS</div>
      <div class="srow-item${m.w===m.b?' srow-win':''}">
        <span class="srow-seed">${m.sb?'#'+m.sb:''}</span>
        <span class="srow-name">${esc(m.b)}</span>
        <div class="wctr">
          <button class="wcb" onclick="adjScore('b',-1)">−</button>
          <span class="wcnum" id="wc-b">${m.wb}</span>
          <button class="wcb" onclick="adjScore('b',1)">+</button>
        </div>
      </div>
    </div>
    <div class="mdivider"></div>
    <div class="slabel">Set winner <span style="font-weight:400;color:var(--muted)">(click again to uncheck)</span></div>
    <div class="wbtns">
      <button class="wbtn${m.w===m.a?' chosen':''}" id="wb-a" onclick="setWinner('a')">🏆 ${esc(m.a)}</button>
      <button class="wbtn${m.w===m.b?' chosen':''}" id="wb-b" onclick="setWinner('b')">🏆 ${esc(m.b)}</button>
    </div>`;

  const confirmBtn = document.getElementById('confirm-btn');
  confirmBtn.textContent = isEdit ? 'Update Result' : 'Confirm & Advance →';
  confirmBtn.style.display = m.w ? '' : 'none';
}

/* setWinner: clicking the already-chosen winner UNchecks it (toggle) */
function setWinner(who){
  const m = getMatch(AM.ctx, AM.r, AM.mi);
  const picked = (who==='a') ? m.a : m.b;
  m.w = (m.w===picked) ? null : picked;
  document.getElementById('wb-a')?.classList.toggle('chosen', m.w===m.a);
  document.getElementById('wb-b')?.classList.toggle('chosen', m.w===m.b);
  document.getElementById('confirm-btn').style.display = m.w ? '' : 'none';
  // update score row win highlight
  const rows = document.querySelectorAll('.srow-item');
  if(rows.length===2){
    rows[0].classList.toggle('srow-win', m.w===m.a);
    rows[1].classList.toggle('srow-win', m.w===m.b);
    rows[0].classList.toggle('srow-lead', !m.w && m.wa>m.wb);
    rows[1].classList.toggle('srow-lead', !m.w && m.wb>m.wa);
  }
}

/* adjScore: track game wins per team — no auto-winner */
function adjScore(who, d){
  const m = getMatch(AM.ctx, AM.r, AM.mi);
  if(who==='a') m.wa = Math.max(0, m.wa + d);
  else          m.wb = Math.max(0, m.wb + d);
  document.getElementById('wc-a').textContent = m.wa;
  document.getElementById('wc-b').textContent = m.wb;
  // update leading highlight on score rows
  document.querySelectorAll('.srow-item').forEach((el,i)=>{
    const leading = i===0 ? m.wa>m.wb : m.wb>m.wa;
    el.classList.toggle('srow-lead', leading);
  });
}


function cascadeReset(ctx, r, mi){
  const m = getMatch(ctx, r, mi);
  if(!m || !m.done) return;
  const oldW    = m._prevW || m.w;
  const oldLoser= oldW===m.a ? m.b : m.a;
  m.done=false; m.w=null; m._prevW=null; m.wa=0; m.wb=0;
  if(!oldW) return;

  if(ctx==='s'){
    if(r+1<G.rounds.length){
      const nxt=G.rounds[r+1][Math.floor(mi/2)];
      if(mi%2===0&&nxt.a===oldW){nxt.a=null;nxt.sa=null;}
      if(mi%2===1&&nxt.b===oldW){nxt.b=null;nxt.sb=null;}
      if(nxt.done) cascadeReset('s',r+1,Math.floor(mi/2));
    }
  } else if(ctx==='wb'){
    if(r+1<G.wb.length){
      const nxt=G.wb[r+1][Math.floor(mi/2)];
      if(mi%2===0&&nxt.a===oldW){nxt.a=null;nxt.sa=null;}
      if(mi%2===1&&nxt.b===oldW){nxt.b=null;nxt.sb=null;}
      if(nxt.done) cascadeReset('wb',r+1,Math.floor(mi/2));
    } else {
      if(G.gf[0].a===oldW){G.gf[0].a=null;G.gf[0].sa=null;}
      if(G.gf[0].done) cascadeReset('gf',0,0);
    }
    if(G.lb.length>0){
      const lbIdx=Math.min(r*2,G.lb.length-1);
      G.lb[lbIdx].forEach((lm,li)=>{
        if(lm.a===oldLoser){lm.a=null;lm.sa=null;if(lm.done)cascadeReset('lb',lbIdx,li);}
        else if(lm.b===oldLoser){lm.b=null;lm.sb=null;if(lm.done)cascadeReset('lb',lbIdx,li);}
      });
    }
  } else if(ctx==='lb'){
    if(r+1<G.lb.length){
      const nxt=G.lb[r+1][Math.floor(mi/2)];
      if(mi%2===0&&nxt.a===oldW){nxt.a=null;nxt.sa=null;}
      if(mi%2===1&&nxt.b===oldW){nxt.b=null;nxt.sb=null;}
      if(nxt.done) cascadeReset('lb',r+1,Math.floor(mi/2));
    } else {
      if(G.gf[0].b===oldW){G.gf[0].b=null;G.gf[0].sb=null;}
      if(G.gf[0].done) cascadeReset('gf',0,0);
    }
  }
  // gf: nothing downstream
}

/* undoMatch — "Undo" button inside the edit banner */
function undoMatch(){
  resetMatch();
}

function closeModal(){
  if(AM){
    renderBracketView();
    renderTabs(); // update progress emoji in tab name
  }
  document.getElementById('modal').style.display='none';
  AM=null;
}

/* ============================================================
   CONFIRM & ADVANCE
============================================================ */
function confirmResult(){
  if(!AM) return;

  // RR
  if(AM.ctx==='rr'){
    const {i,j}=AM;
    const sa=parseInt(document.getElementById('rr-sa').textContent)||0;
    const sb=parseInt(document.getElementById('rr-sb').textContent)||0;
    if(sa===sb){alert('Scores cannot be tied.');return;}
    const r=G.results[i][j], r2=G.results[j][i];
    r.played=true;r.si=sa;r.sj=sb;r.wi=(sa>sb);
    r2.played=true;r2.si=sb;r2.sj=sa;r2.wi=(sb>sa);
    closeModal(); return;
  }

  const {ctx,r,mi}=AM;
  const m=getMatch(ctx,r,mi);
  if(!m.w){alert('Please click a "Set winner" button first.');return;}

  // If already done with a DIFFERENT winner, reverse the old result first
  if(m.done && m.w !== m._prevW){
    // store new intended winner, temporarily clear m.w so resetMatch logic can read old one
    const newWinner=m.w;
    // reset match silently (no modal re-open)
    _silentReset(ctx,r,mi);
    // restore new winner choice
    m.w=newWinner;
  }

  const winner=m.w;
  const loser = winner===m.a?m.b:m.a;
  const wseed = winner===m.a?m.sa:m.sb;
  const lseed = winner===m.a?m.sb:m.sa;
  m.done=true;
  m._prevW=winner; // remember for future edits

  if(ctx==='s'){
    fwdSE(G.rounds,r,mi,winner,wseed);
  }else if(ctx==='wb'){
    if(r+1<G.wb.length){
      const nxt=G.wb[r+1][Math.floor(mi/2)];
      if(mi%2===0){nxt.a=winner;nxt.sa=wseed;}else{nxt.b=winner;nxt.sb=wseed;}
    }else{
      G.gf[0].a=winner;G.gf[0].sa=wseed;
    }
    if(G.lb.length>0){
      const lbIdx=Math.min(r*2,G.lb.length-1);
      const lbR=G.lb[lbIdx];
      const slot=lbR.find(lm=>!lm.a)||lbR.find(lm=>lm.a&&!lm.b);
      if(slot){if(!slot.a){slot.a=loser;slot.sa=lseed;}else{slot.b=loser;slot.sb=lseed;}}
    }
  }else if(ctx==='lb'){
    if(r+1<G.lb.length){
      const nxt=G.lb[r+1][Math.floor(mi/2)];
      if(mi%2===0){nxt.a=winner;nxt.sa=wseed;}else{nxt.b=winner;nxt.sb=wseed;}
    }else{
      G.gf[0].b=winner;G.gf[0].sb=wseed;
    }
  }

  closeModal();
}

/* Silent reset — like resetMatch but doesn't re-open modal */
function _silentReset(ctx,r,mi){
  const m=getMatch(ctx,r,mi);
  if(!m) return;
  const oldW=m._prevW||m.w;
  const oldLoser=oldW===m.a?m.b:m.a;
  const oldLseed=oldW===m.a?m.sb:m.sa;
  m.done=false; m.w=null; m._prevW=null;

  if(ctx==='s'){
    if(r+1<G.rounds.length){
      const nxt=G.rounds[r+1][Math.floor(mi/2)];
      if(mi%2===0){if(nxt.a===oldW){nxt.a=null;nxt.sa=null;}}
      else         {if(nxt.b===oldW){nxt.b=null;nxt.sb=null;}}
      if(nxt.done) cascadeReset('s',r+1,Math.floor(mi/2));
    }
  }else if(ctx==='wb'){
    if(r+1<G.wb.length){
      const nxt=G.wb[r+1][Math.floor(mi/2)];
      if(mi%2===0){if(nxt.a===oldW){nxt.a=null;nxt.sa=null;}}
      else         {if(nxt.b===oldW){nxt.b=null;nxt.sb=null;}}
      if(nxt.done) cascadeReset('wb',r+1,Math.floor(mi/2));
    }else{
      if(G.gf[0].a===oldW){G.gf[0].a=null;G.gf[0].sa=null;}
      if(G.gf[0].done) cascadeReset('gf',0,0);
    }
    if(G.lb.length>0){
      const lbIdx=Math.min(r*2,G.lb.length-1);
      G.lb[lbIdx].forEach((lm,li)=>{
        if(lm.a===oldLoser){lm.a=null;lm.sa=null;if(lm.done)cascadeReset('lb',lbIdx,li);}
        else if(lm.b===oldLoser){lm.b=null;lm.sb=null;if(lm.done)cascadeReset('lb',lbIdx,li);}
      });
    }
  }else if(ctx==='lb'){
    if(r+1<G.lb.length){
      const nxt=G.lb[r+1][Math.floor(mi/2)];
      if(mi%2===0){if(nxt.a===oldW){nxt.a=null;nxt.sa=null;}}
      else         {if(nxt.b===oldW){nxt.b=null;nxt.sb=null;}}
      if(nxt.done) cascadeReset('lb',r+1,Math.floor(mi/2));
    }else{
      if(G.gf[0].b===oldW){G.gf[0].b=null;G.gf[0].sb=null;}
      if(G.gf[0].done) cascadeReset('gf',0,0);
    }
  }
}

/* resetMatch — called by Undo button in edit banner */
function resetMatch(){
  if(!AM) return;
  const {ctx,r,mi}=AM;
  cascadeReset(ctx,r,mi);
  document.getElementById('modal').style.display='none';
  AM=null;
  renderBracketView();
  renderTabs();
  // Re-open so user can immediately enter correct result
  setTimeout(()=>openModal(ctx,r,mi), 80);
}

/* ============================================================
   PROGRESS
============================================================ */
function updProg(){
  let tot=0,dn=0;
  function cnt(rnds){rnds.forEach(rnd=>rnd.forEach(m=>{if(m.a&&m.b&&m.a!=='BYE'&&m.b!=='BYE'){tot++;if(m.done)dn++;}}));}
  if(G.type==='single')      cnt(G.rounds);
  else if(G.type==='double') {cnt(G.wb);cnt(G.lb);cnt([G.gf]);}
  else if(G.type==='rr'){
    tot=G.n*(G.n-1)/2;
    for(let i=0;i<G.n;i++) for(let j=i+1;j<G.n;j++) if(G.results[i][j].played)dn++;
  }
  document.getElementById('progf').style.width=(tot>0?Math.round(dn/tot*100):0)+'%';
}

/* ============================================================
   KEYBOARD
============================================================ */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&AM) closeModal();
  if(e.key==='Enter'&&AM)  confirmResult();
});

/* ============================================================
   BOOT
============================================================ */
init();
</script>
