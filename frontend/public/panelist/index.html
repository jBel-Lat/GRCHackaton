<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Grading System - Panelist Login</title>
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/panelist.css">
    <style>
        :root { --grc-maroon: #9B0F06; --grc-gray: #666; --bg: #f7f6f3; }
        body { background: var(--bg); }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }
        .login-box {
            background: #fff;
            padding: 2.25rem;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 420px;
            border: 1px solid #ece7df;
        }
        .brand-lockup { text-align: center; margin-bottom: 1.25rem; }
        .brand-mark {
            margin: 0 auto 0.75rem;
            display: flex;
            justify-content: center;
        }
        .brand-mark img { width: 240px; height: auto; display: block; }
        .brand-title { font-size: 1.45rem; color: var(--grc-maroon); font-weight: 800; line-height: 1.1; }
        .brand-sub { color: var(--grc-gray); font-size: 0.95rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.35rem; color: #3a3a3a; font-weight: 600; }
        .form-group input {
            width: 100%; padding: 0.7rem 0.8rem;
            border: 1px solid #d8d3ca; border-radius: 10px;
            font-size: 1rem; box-sizing: border-box; background: #fff;
        }
        .form-group input:focus { outline: none; border-color: var(--grc-maroon); box-shadow: 0 0 0 3px rgba(155, 15, 6, 0.12); }
        .password-field {
            position: relative;
        }
        .password-field input {
            padding-right: 2.8rem;
        }
        .password-toggle {
            position: absolute;
            top: 50%;
            right: 0.6rem;
            transform: translateY(-50%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            border: none;
            background: transparent;
            color: #555;
            cursor: pointer;
            padding: 0;
        }
        .password-toggle:hover { color: var(--grc-maroon); }
        .password-toggle:focus-visible {
            outline: 2px solid rgba(155, 15, 6, 0.4);
            outline-offset: 2px;
            border-radius: 6px;
        }
        .password-toggle svg {
            width: 1.1rem;
            height: 1.1rem;
        }
        .password-toggle .eye-off {
            display: none;
        }
        .password-toggle.is-visible .eye-on {
            display: none;
        }
        .password-toggle.is-visible .eye-off {
            display: block;
        }
        .login-btn {
            width: 100%; padding: 0.8rem; background: var(--grc-maroon); color: white;
            border: none; border-radius: 10px; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 12px 24px rgba(155, 15, 6, 0.18);
        }
        .login-btn:hover { transform: translateY(-1px); }
        .login-btn:active { transform: translateY(0); }
        .error-message {
            color: #b3261e; margin-bottom: 1rem; padding: 0.75rem;
            background: #ffecec; border-radius: 8px; display: none; border: 1px solid #f5c7c3;
        }
        .switch-role { text-align: center; margin-top: 1rem; font-size: 0.9rem; color: var(--grc-gray); }
        .switch-role a { color: var(--grc-maroon); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="brand-lockup">
                <div class="brand-mark">
                    <img src="/img/grc.png" alt="Global Reciprocal Colleges">
                </div>
                <div class="brand-sub">Panelist Portal</div>
            </div>
            <div id="errorMessage" class="error-message"></div>
            <div id="welcomeBack" class="text-center text-muted" style="margin-bottom:1rem;"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-field">
                        <input type="password" id="password" name="password" required>
                        <button type="button" class="password-toggle" data-toggle-password="password" aria-label="Show password">
                            <svg class="eye-on" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path d="M2 12C4.8 7.8 8.1 5.8 12 5.8C15.9 5.8 19.2 7.8 22 12C19.2 16.2 15.9 18.2 12 18.2C8.1 18.2 4.8 16.2 2 12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                                <circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.8"/>
                            </svg>
                            <svg class="eye-off" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path d="M3.5 3.5L20.5 20.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                                <path d="M4.3 8.9C6.4 6.8 8.8 5.8 12 5.8C15.9 5.8 19.2 7.8 22 12C20.9 13.7 19.8 15 18.6 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M15.4 17.5C14.4 18 13.3 18.2 12 18.2C8.1 18.2 4.8 16.2 2 12C2.9 10.7 3.8 9.7 4.8 8.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>
        </div>
    </div>

    <script src="/panelist/js/api.js"></script>
    <script src="/panelist/js/panelist.js"></script>
</body>
</html>
